name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Build
        run: npm run build 2>&1 | tee /tmp/build.log

      - name: Show build log tail
        if: always()
        run: |
          echo "=== BUILD LOG TAIL ==="
          tail -50 /tmp/build.log 2>/dev/null || echo "No log"
          echo "=== DIST CHECK ==="
          ls -la dist/ | head -10

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 3

  deploy:
    name: Deploy via Wrangler
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install wrangler@latest --no-save --no-audit --no-fund

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Account ID: $CLOUDFLARE_ACCOUNT_ID"
          echo "Token (first 20): ${CLOUDFLARE_API_TOKEN:0:20}..."
          npx wrangler deploy 2>&1 | tee /tmp/deploy.log

      - name: Purge CF cache
        if: success()
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: '47f87944d6d690eb388e7be1143c14a2'
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}' | head -c 300

      - name: Verify deployment
        if: success()
        run: |
          sleep 30
          echo "=== Verifying live URLs ==="
          for slug in "" "tentang-kami/" "jasa-iklan-facebook/" "blog/agency-digital-aceh/" "jasa-iklan-facebook/pilar/" "2dac33f6303f4041b9ec7e2f2910ea80.txt"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://beriklan.co.id/$slug")
            echo "  /$slug: HTTP $code"
          done
