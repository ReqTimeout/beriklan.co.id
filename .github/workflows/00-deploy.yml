name: Deploy to Cloudflare

# Trigger on push to main branch — runs after tests pass
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 3

  deploy:
    name: Deploy via Wrangler
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on main branch pushes (not PRs)
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install wrangler
        run: npm install wrangler@latest --no-save

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Purge CF cache (force fresh content)
        if: success()
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: '47f87944d6d690eb388e7be1143c14a2'
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}' | head -c 200

      - name: Verify deployment
        if: success()
        run: |
          sleep 10
          for slug in "" "tentang-kami/" "privacy-policy/" "jasa-iklan-facebook/"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://beriklan.co.id/$slug")
            echo "  /$slug: HTTP $code"
          done
